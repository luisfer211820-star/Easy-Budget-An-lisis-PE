<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Cuenta — EasyBudget</title>
  <meta name="description" content="Crea tu cuenta en EasyBudget.">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 20px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      transition: color var(--transition);
    }
    .back-link:hover {
      color: var(--primary-light);
    }
    
    /* Estilo para los requisitos de contraseña */
    .password-requirements {
      margin-top: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .password-requirements p {
      margin-bottom: 4px;
      font-weight: 500;
    }
    .password-requirements ul {
      list-style: none;
      padding-left: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .password-requirements li {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
    }
    .req-met {
      color: #10b981;
    }
    .req-unmet {
      color: #64748b;
    }
  </style>
</head>
<body class="auth-page">
  <div class="auth-card" role="main">
    <a href="login.html" class="back-link">
      ← Volver al inicio de sesión
    </a>

    <div class="auth-logo">
      <div class="logo-icon">💰</div>
      <span class="logo-text">EasyBudget</span>
    </div>

    <h1 class="auth-title">Crea tu cuenta</h1>
    <p class="auth-subtitle">Regístrate para comenzar</p>

    <div class="alert alert-error" id="alertError" role="alert"></div>

    <form id="registerForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="name">Nombre completo</label>
        <input class="form-input" type="text" id="name" placeholder="Ej: Juan Perez" autocomplete="name" required>
        <span class="form-error" id="nameError"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Correo electrónico</label>
        <input class="form-input" type="email" id="email" placeholder="tu@correo.com" autocomplete="email" required>
        <span class="form-error" id="emailError"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input class="form-input" type="password" id="password" placeholder="Escribe tu contraseña" autocomplete="new-password" required>
        
        <!-- Requisitos de contraseña visibles -->
        <div class="password-requirements">
          <p>La contraseña debe cumplir con:</p>
          <ul>
            <li id="req-length" class="req-unmet">🔴 Mínimo 6 caracteres</li>
            <li id="req-uppercase" class="req-unmet">🔴 Una letra mayúscula</li>
            <li id="req-special" class="req-unmet">🔴 Un carácter especial (!@#$%^&*)</li>
          </ul>
        </div>
        <span class="form-error" id="passwordError"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm">Confirmar contraseña</label>
        <input class="form-input" type="password" id="confirm" placeholder="Repite tu contraseña" autocomplete="new-password" required>
        <span class="form-error" id="confirmError"></span>
      </div>

      <button class="btn btn-primary" type="submit" id="submitBtn">
        <span id="btnText">Crear cuenta</span>
      </button>
    </form>

    <div class="auth-switch">
      ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
    </div>
  </div>

  <script type="module">
    import { register, getSession } from '../js/auth.js';

    if (getSession()) window.location.href = 'dashboard.html';

    const form = document.getElementById('registerForm');
    const nameEl = document.getElementById('name');
    const emailEl = document.getElementById('email');
    const passwordEl = document.getElementById('password');
    const confirmEl = document.getElementById('confirm');
    const alertError = document.getElementById('alertError');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');

    // Elementos de requisitos
    const reqLength = document.getElementById('req-length');
    const reqUppercase = document.getElementById('req-uppercase');
    const reqSpecial = document.getElementById('req-special');

    // Función para actualizar los requisitos en tiempo real
    function actualizarRequisitos() {
      const password = passwordEl.value;
      
      // Verificar longitud
      if (password.length >= 6) {
        reqLength.innerHTML = '🟢 Mínimo 6 caracteres';
        reqLength.className = 'req-met';
      } else {
        reqLength.innerHTML = '🔴 Mínimo 6 caracteres';
        reqLength.className = 'req-unmet';
      }
      
      // Verificar mayúscula
      if (/[A-Z]/.test(password)) {
        reqUppercase.innerHTML = '🟢 Una letra mayúscula';
        reqUppercase.className = 'req-met';
      } else {
        reqUppercase.innerHTML = '🔴 Una letra mayúscula';
        reqUppercase.className = 'req-unmet';
      }
      
      // Verificar carácter especial
      if (/[!@#$%^&*()_\-+=<>?{}[\]~|]/.test(password)) {
        reqSpecial.innerHTML = '🟢 Un carácter especial (!@#$%^&*)';
        reqSpecial.className = 'req-met';
      } else {
        reqSpecial.innerHTML = '🔴 Un carácter especial (!@#$%^&*)';
        reqSpecial.className = 'req-unmet';
      }
    }

    // Escuchar cambios en el campo de contraseña
    passwordEl.addEventListener('input', actualizarRequisitos);

    function showErr(inputEl, errorId, msg) {
      inputEl.classList.add('error');
      const el = document.getElementById(errorId);
      el.textContent = msg;
      el.classList.add('visible');
    }
    
    function clearErrors() {
      [nameEl, emailEl, passwordEl, confirmEl].forEach(el => el.classList.remove('error'));
      document.querySelectorAll('.form-error').forEach(e => e.classList.remove('visible'));
      alertError.classList.remove('visible');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();
      
      const name = nameEl.value.trim();
      const email = emailEl.value.trim();
      const password = passwordEl.value;
      const confirm = confirmEl.value;
      let valid = true;

      // VALIDACIÓN NOMBRE
      const nombreRegex = /^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$/;
      if (!name || name.length < 10) {
        showErr(nameEl, 'nameError', 'El nombre debe tener mínimo 10 caracteres.');
        valid = false;
      } else if (!nombreRegex.test(name)) {
        showErr(nameEl, 'nameError', 'El nombre solo puede contener letras y espacios.');
        valid = false;
      }
      
      // VALIDACIÓN CORREO
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { 
        showErr(emailEl, 'emailError', 'Ingresa un correo válido.'); 
        valid = false; 
      }
      
      // VALIDACIÓN CONTRASEÑA
      if (!password) {
        showErr(passwordEl, 'passwordError', 'La contraseña es obligatoria.');
        valid = false;
      } else if (password.length < 6) {
        showErr(passwordEl, 'passwordError', 'La contraseña debe tener mínimo 6 caracteres.');
        valid = false;
      } else if (!/[A-Z]/.test(password)) {
        showErr(passwordEl, 'passwordError', 'La contraseña debe contener al menos una letra mayúscula.');
        valid = false;
      } else if (!/[!@#$%^&*()_\-+=<>?{}[\]~|]/.test(password)) {
        showErr(passwordEl, 'passwordError', 'La contraseña debe contener al menos un carácter especial.');
        valid = false;
      }
      
      if (password !== confirm) { 
        showErr(confirmEl, 'confirmError', 'Las contraseñas no coinciden.'); 
        valid = false; 
      }
      
      if (!valid) return;

      btnText.textContent = 'Creando cuenta…';
      submitBtn.disabled = true;

      const result = await register(name, email, password);
      if (result.ok) {
        window.location.href = 'dashboard.html';
      } else {
        alertError.textContent = result.error;
        alertError.classList.add('visible');
        btnText.textContent = 'Crear cuenta';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
